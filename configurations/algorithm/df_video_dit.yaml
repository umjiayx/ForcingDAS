defaults:
  - df_base

n_frames: ${dataset.n_frames}
frame_skip: ${dataset.frame_skip}
metadata: ${dataset.metadata}

# training hyperparameters
weight_decay: 1e-3
warmup_steps: 5000
optimizer_beta: [0.9, 0.99]

diffusion:
  # training
  beta_schedule: sigmoid
  objective: pred_v
  use_fused_snr: True
  cum_snr_decay: 0.96
  clip_noise: 6.
  # sampling
  sampling_timesteps: 100
  ddim_sampling_eta: 0.0
  stabilization_level: 15
  # architecture
  architecture:
    backbone: dit3d
    # --- DiT hyperparameters ---
    # Named sizes:  S (384/12/6, ~33M)
    #               B (768/12/12, ~130M)
    #               L (1024/24/16, ~458M)
    #               XL (1152/28/16, ~675M)
    hidden_size: 384
    depth: 12
    num_heads: 6
    patch_size: 2
    mlp_ratio: 4.0
    max_frames: 64
    attention_type: factorized   # "factorized" (recommended) or "full"
    use_gradient_checkpointing: False

metrics:
  - fvd
  # - fid
  # - lpips
