# Navier-Stokes vorticity dataset configuration

defaults:
  - base_dataset

data_dir: /path/to/ns

n_frames: 10
resolution: 128
observation_shape: [1, "${dataset.resolution}", "${dataset.resolution}"]
context_length: 2
validation_multiplier: 1
frame_skip: 1
metadata: null

# Original data statistics
data_min: -19.16
data_max: 17.42
data_raw_std: 3.07

# Normalization: "minmax" or "zscore"
normalization: "minmax"

# These are set based on normalization (overridden in DiffusionForcingNS.__init__):
#   minmax → 0.5 / 0.5   (maps [0,1] → [-1,1])
#   zscore → 0.0 / 1.0   (_normalize_x becomes identity)
data_mean: 0.5
data_std: 0.5

external_cond_dim: 0

# Optional trajectory-axis slice for non-training splits. Override on the CLI to
# fan out a multi-trajectory test run across multiple GPUs:
#   dataset.start_idx=2 dataset.n_traj=1 experiment.test.limit_batch=1
# Defaults below keep the original "use all trajectories" behaviour.
start_idx: 0
n_traj: null

# Optional: replicate clip 0 of each trajectory M times for ensemble forecasting.
# When > 1 (and split != "training"), each trajectory yields M identical clip-0
# samples; combined with batch_size=M and shuffle=False, each test batch contains
# M independent diffusion draws sharing the same clean context.  Default 1
# preserves the original sliding-clip behaviour.
repeat_for_ensemble: 1
